name: Backend Deploy (Java 21)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # 对齐你的 Corretto 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Inject Production Config
        env:
          PROD_APP_CONFIG: ${{ secrets.PROD_APP_CONFIG }}
        run: |
          mkdir -p src/main/resources
          printf '%s\n' "$PROD_APP_CONFIG" > src/main/resources/application-prod.yaml

      - name: Build with Maven
        run: mvn clean package -Dmaven.test.skip=true

      # 1. 传输到临时文件夹 /project/ai-code-generator-backend
      - name: Upload to Temp Directory
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/project/ai-code-generator-backend"
          strip_components: 1

      # 2. 从临时文件夹搬运并重启
      # 远程是非交互 shell，PATH 很短；SDKMAN 只在 ~/.bashrc 里加 PATH，SSH 脚本读不到。可设 JAVA_HOME，或依赖下方对 ~/.sdkman/candidates/java/current 的探测
      - name: Atomic Deploy and Restart
        env:
          JAVA_HOME: ${{ secrets.JAVA_HOME }}
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: JAVA_HOME
          script: |
            # 确保目标目录存在
            mkdir -p /opt/1panel/www/sites/ai-code-generator/
            
            # 停止旧进程：只用 pgrep -x java，再读 /proc/cmdline 核对 JAR，
            # 避免 pgrep -f JAR 名匹配到 sh -c '...' 里含同一字符串而自杀（SSH 143）
            JAR_NAME="ai-code-generator-0.0.1-SNAPSHOT.jar"
            for pid in $(pgrep -x java 2>/dev/null || true); do
              if [ -r "/proc/${pid}/cmdline" ] && tr '\0' ' ' < "/proc/${pid}/cmdline" | grep -Fq -- "$JAR_NAME"; then
                kill -15 "$pid" 2>/dev/null || true
              fi
            done
            sleep 2
            
            # 搬运 JAR 包
            mv "/project/ai-code-generator-backend/${JAR_NAME}" "/opt/1panel/www/sites/ai-code-generator/"
            
            # 启动服务（必须用绝对路径或 JAVA_HOME：SSH 不会加载 ~/.bashrc / sdkman init）
            JAVA_CMD=""
            if [ -n "$JAVA_HOME" ] && [ -x "$JAVA_HOME/bin/java" ]; then
              JAVA_CMD="$JAVA_HOME/bin/java"
            elif [ -x /usr/bin/java ]; then
              JAVA_CMD="/usr/bin/java"
            else
              for d in \
                "${HOME}/.sdkman/candidates/java/current" \
                /root/.sdkman/candidates/java/current \
                /usr/lib/jvm/java-21-openjdk-amd64 \
                /usr/lib/jvm/java-21-openjdk \
                /usr/lib/jvm/java-21-amazon-corretto \
                /usr/lib/jvm/default-java; do
                if [ -n "$d" ] && [ -x "$d/bin/java" ]; then JAVA_CMD="$d/bin/java"; break; fi
              done
            fi
            if [ -z "$JAVA_CMD" ]; then
              echo "找不到 java：若用 SDKMAN，请在 Secrets 设置 JAVA_HOME 为 /root/.sdkman/candidates/java/current（或当前版本目录，如 .../21.0.5-tem）"
              exit 1
            fi
            cd /opt/1panel/www/sites/ai-code-generator/
            nohup "$JAVA_CMD" \
              -Xms256m \
              -Xmx768m \
              -XX:MaxMetaspaceSize=256m \
              -XX:MaxDirectMemorySize=128m \
              -XX:+UseG1GC \
              -XX:MaxGCPauseMillis=200 \
              -XX:+HeapDumpOnOutOfMemoryError \
              -Dspring.profiles.active=prod \
              -jar "$JAR_NAME" > app.log 2>&1 &